services:
  db:
    image: postgres:16
    container_name: warzone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: warzone
    ports:
      - "15432:5432"
    volumes:
      - warzone_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warzone-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy  
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/warzone
    ports:
      - "8000:8000"
    volumes:
      - .:/app  
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: warzone-dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  warzone_data: